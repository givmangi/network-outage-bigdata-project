---
# Internet Outage Intelligence Stack
# ====================================
# Services (always-on, started by 'docker compose up -d'):
#   kafka              - Message broker (KRaft mode, no Zookeeper)
#   kafka-ui           - Web UI — http://localhost:8080
#   minio              - S3-compatible object storage
#   minio-init         - One-shot: creates bronze/silver/gold buckets + removes stale ones
#   ingester           - IODA bronze ingestion polling loop
#   ripe-ingester      - RIPE Atlas WebSocket streaming ingestion
#   spark-silver-stream- Spark Structured Streaming: Kafka → Silver (live path)
#
# On-demand batch jobs (run explicitly, exit when done):
#   spark-silver-ioda  - IODA Bronze → Silver batch backfill
#   spark-silver-ripe  - RIPE Bronze → Silver batch backfill
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d
#
# First-time Silver backfill (run after ingesters have populated Bronze):
#   docker compose run --rm --no-deps spark-silver-ioda
#   docker compose run --rm --no-deps spark-silver-ripe
#
# Cleanup stale MinIO buckets (ioda-bronze, ioda-silver):
#   docker compose restart minio-init
#   (minio-init now removes them automatically on every startup)

services:

  # -------------------------------------------------------------------------
  # Kafka (KRaft mode — no Zookeeper)
  # -------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ioda-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_RETENTION_BYTES: -1
      KAFKA_LOG_SEGMENT_BYTES: 134217728
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      CLUSTER_ID: "${KAFKA_CLUSTER_ID}"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ioda-net

  # -------------------------------------------------------------------------
  # Kafka UI — http://localhost:8080
  # -------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: ioda-kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ioda-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - ioda-net

  # -------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # Ports: 9000 (S3 API), 9001 (web console — http://localhost:9001)
  # -------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: ioda-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - ioda-net

  # -------------------------------------------------------------------------
  # MinIO init — bucket housekeeping (runs on every stack start)
  # -------------------------------------------------------------------------
  # Creates the canonical bronze/silver/gold buckets.
  # Also removes the stale ioda-bronze and ioda-silver buckets that were
  # created by the original docker-compose and are no longer used.
  # 'restart: on-failure' means it will retry if MinIO isn't ready yet,
  # but won't loop once it exits 0.
  # -------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    container_name: ioda-minio-init
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        echo '--- Ensuring canonical buckets exist ---' &&
        mc mb --ignore-existing local/bronze &&
        mc mb --ignore-existing local/silver &&
        mc mb --ignore-existing local/gold &&
        echo '--- Removing stale legacy buckets (safe: --force only deletes if empty) ---' &&
        mc rb --force local/ioda-bronze 2>/dev/null && echo 'Removed ioda-bronze' || echo 'ioda-bronze not present or not empty, skipping' &&
        mc rb --force local/ioda-silver 2>/dev/null && echo 'Removed ioda-silver' || echo 'ioda-silver not present or not empty, skipping' &&
        echo '--- Current bucket list ---' &&
        mc ls local/
      "
    networks:
      - ioda-net

  # -------------------------------------------------------------------------
  # IODA Bronze Ingester
  # -------------------------------------------------------------------------
  ingester:
    build:
      context: ./ingester
      dockerfile: Dockerfile
    container_name: ioda-ingester
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      IODA_BASE_URL: "https://api.ioda.inetintel.cc.gatech.edu/v2"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      S3_BUCKET_BRONZE: "bronze"
      S3_BUCKET_SILVER: "silver"
      ENTITY_TYPE: "${ENTITY_TYPE:-country}"
      ENTITY_CODES: "${ENTITY_CODES:-IT MM IN PK UA RU PS SY IR TR BD NG US DE GB}"
      LOOKBACK_MINUTES: "${LOOKBACK_MINUTES:-20}"
      POLL_INTERVAL_SECONDS: "${POLL_INTERVAL_SECONDS:-900}"
    networks:
      - ioda-net
    volumes:
      - ./ingester:/app

  # -------------------------------------------------------------------------
  # RIPE Atlas Bronze Ingester (WebSocket streaming)
  # -------------------------------------------------------------------------
  ripe-ingester:
    build:
      context: ./ingestion/ripe
      dockerfile: Dockerfile
    container_name: ripe-ingester
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      S3_ENDPOINT_URL: "http://minio:9000"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
      S3_BUCKET_BRONZE: "bronze"
    networks:
      - ioda-net
    volumes:
      - ./ingestion/ripe:/app

  # =========================================================================
  # SILVER LAYER — Batch jobs (on-demand, no profiles, exit when done)
  # =========================================================================
  # These are intentionally NOT started by 'docker compose up -d'.
  # They have no 'restart' policy, so they run once and stop.
  # Invoke with:
  #   docker compose run --rm --no-deps spark-silver-ioda [--start YYYY-MM-DD] [--end YYYY-MM-DD]
  #   docker compose run --rm --no-deps spark-silver-ripe  [--start YYYY-MM-DD] [--end YYYY-MM-DD]
  #
  # --no-deps: skip starting depends_on services (minio and kafka are already up)
  #
  # The --packages list is passed as a single comma-separated string (no spaces,
  # no line breaks) because spark-submit does not accept whitespace in the value.
  # =========================================================================

  spark-silver-ioda:
    image: apache/spark:3.5.1
    container_name: spark-silver-ioda
    # No restart policy — runs once and exits
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      S3_ENDPOINT_URL:  "http://minio:9000"
      S3_ACCESS_KEY:    "${MINIO_ROOT_USER}"
      S3_SECRET_KEY:    "${MINIO_ROOT_PASSWORD}"
      S3_BUCKET_BRONZE: "bronze"
      S3_BUCKET_SILVER: "silver"
    volumes:
      - ./spark:/opt/spark-job
      # Ivy cache persisted in a named volume so JARs are only downloaded once.
      - spark-ivy-cache:/opt/spark/.ivy2
    # The wrapper script creates .ivy2/cache/ as the spark user before
    # calling spark-submit, fixing the root-owned volume write error.
    entrypoint: ["/opt/spark-job/entrypoint.sh"]
    command:
      - --master
      - local[*]
      - --packages
      - "org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262"
      - --conf
      - spark.jars.ivy=/opt/spark/.ivy2
      - --conf
      - spark.hadoop.fs.s3a.endpoint=http://minio:9000
      - --conf
      - spark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER}
      - --conf
      - spark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD}
      - --conf
      - spark.hadoop.fs.s3a.path.style.access=true
      - --conf
      - spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
      - --conf
      - spark.hadoop.fs.s3a.connection.ssl.enabled=false
      - --conf
      - spark.sql.shuffle.partitions=8
      - --conf
      - spark.sql.files.ignoreMissingFiles=true
      - /opt/spark-job/silver_ioda.py
    # Extra args appended by: docker compose run --rm --no-deps spark-silver-ioda --start 2026-06-01
    networks:
      - ioda-net

  spark-silver-ripe:
    image: apache/spark:3.5.1
    container_name: spark-silver-ripe
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      S3_ENDPOINT_URL:  "http://minio:9000"
      S3_ACCESS_KEY:    "${MINIO_ROOT_USER}"
      S3_SECRET_KEY:    "${MINIO_ROOT_PASSWORD}"
      S3_BUCKET_BRONZE: "bronze"
      S3_BUCKET_SILVER: "silver"
    volumes:
      - ./spark:/opt/spark-job
      - spark-ivy-cache:/opt/spark/.ivy2
    entrypoint: ["/opt/spark-job/entrypoint.sh"]
    command:
      - --master
      - local[*]
      - --packages
      - "org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262"
      - --conf
      - spark.jars.ivy=/opt/spark/.ivy2
      - --conf
      - spark.hadoop.fs.s3a.endpoint=http://minio:9000
      - --conf
      - spark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER}
      - --conf
      - spark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD}
      - --conf
      - spark.hadoop.fs.s3a.path.style.access=true
      - --conf
      - spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
      - --conf
      - spark.hadoop.fs.s3a.connection.ssl.enabled=false
      - --conf
      - spark.sql.shuffle.partitions=8
      - --conf
      - spark.sql.files.ignoreMissingFiles=true
      - /opt/spark-job/silver_ripe.py
    networks:
      - ioda-net

  # =========================================================================
  # SILVER LAYER — Structured Streaming (always-on, live Kafka path)
  # =========================================================================
  # Reads from Kafka topics starting at 'latest' — processes new messages
  # as they arrive from the Bronze ingesters.
  # This does NOT backfill historical data; use the batch jobs above for that.
  #
  # Checkpoints in silver/_checkpoints/ persist Kafka offsets across restarts.
  # =========================================================================
  spark-silver-stream:
    image: apache/spark:3.5.1
    container_name: spark-silver-stream
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      S3_ENDPOINT_URL:         "http://minio:9000"
      S3_ACCESS_KEY:           "${MINIO_ROOT_USER}"
      S3_SECRET_KEY:           "${MINIO_ROOT_PASSWORD}"
      S3_BUCKET_BRONZE:        "bronze"
      S3_BUCKET_SILVER:        "silver"
      MICRO_BATCH_INTERVAL:    "${MICRO_BATCH_INTERVAL:-2 minutes}"
    volumes:
      - ./spark:/opt/spark-job
      - spark-ivy-cache:/opt/spark/.ivy2
    entrypoint: ["/opt/spark-job/entrypoint.sh"]
    command:
      - --master
      - local[*]
      - --packages
      - "org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1"
      - --conf
      - spark.jars.ivy=/opt/spark/.ivy2
      - --conf
      - spark.hadoop.fs.s3a.endpoint=http://minio:9000
      - --conf
      - spark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER}
      - --conf
      - spark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD}
      - --conf
      - spark.hadoop.fs.s3a.path.style.access=true
      - --conf
      - spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
      - --conf
      - spark.hadoop.fs.s3a.connection.ssl.enabled=false
      - --conf
      - spark.sql.shuffle.partitions=8
      - --conf
      - spark.streaming.stopGracefullyOnShutdown=true
      - /opt/spark-job/silver_streaming.py
    networks:
      - ioda-net

# -------------------------------------------------------------------------
# Named volumes
# -------------------------------------------------------------------------
volumes:
  kafka-data:
    driver: local
  minio-data:
    driver: local
  # Shared Ivy cache for all Spark containers.
  # Avoids re-downloading --packages JARs on every container restart.
  # Mounted at /opt/spark/.ivy2 which the spark user owns inside apache/spark.
  spark-ivy-cache:
    driver: local

# -------------------------------------------------------------------------
# Network
# -------------------------------------------------------------------------
networks:
  ioda-net:
    driver: bridge