---
# IODA Bronze Layer Stack
# ========================
# Services:
#   kafka       - Message broker (KRaft mode, no Zookeeper needed)
#   kafka-ui    - Web UI to inspect topics and messages
#   minio       - S3-compatible object storage (the Bronze data lake)
#   minio-init  - One-shot container that creates the bucket on first boot
#   ingester    - Python container that polls IODA and writes to Kafka + MinIO
#
# Quick start:
#   cp .env.example .env        # then edit credentials
#   docker compose up -d
#   docker compose logs -f ingester
#
# To trigger a manual backfill:
#   docker compose run --rm ingester \
#       python ioda_bronze_ingestion.py \
#       --mode backfill --entity-type country --entity-codes IT --days-back 7

services:

  # -------------------------------------------------------------------------
  # Kafka (KRaft mode — no Zookeeper)
  # -------------------------------------------------------------------------
  # KRaft is Kafka's built-in consensus protocol, stable since Kafka 3.3.
  # It removes the Zookeeper dependency entirely, halving the number of
  # containers needed and eliminating an entire class of split-brain failure.
  #
  # We configure a single-broker setup. For an academic project this is
  # perfectly adequate: a single broker still gives you durable log storage,
  # consumer group coordination, and the decoupling semantics we need.
  # Scaling to 3 brokers later only requires changing KAFKA_NODE_ID and
  # the CONTROLLER_QUORUM_VOTERS list.
  #
  # Ports:
  #   9092  - accessible from the host (for debugging with kafkacat / kcat)
  #   29092 - internal listener used by other containers in the same network
  # -------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ioda-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # KRaft: this broker is both controller and broker (roles combined)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      # Two listeners:
      #   PLAINTEXT     -> used by containers inside the Docker network (port 29092)
      #   PLAINTEXT_HOST -> used by the host machine (port 9092, mapped above)
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # Log retention: keep messages for 72 hours.
      # This acts as a replayable buffer: if the ingester or a downstream
      # consumer crashes, it can re-read the last 72h of raw IODA data
      # directly from Kafka without needing to re-poll the API.
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_RETENTION_BYTES: -1         # no size cap, only time cap
      KAFKA_LOG_SEGMENT_BYTES: 134217728    # 128 MB segments

      # Replication: 1 (single broker — no replication possible)
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1

      # Auto-create topics when the ingester first publishes.
      # In production you'd disable this and create topics explicitly,
      # but for an academic project it removes a manual setup step.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4

      # KRaft requires a cluster ID. Generate once with:
      #   docker run --rm confluentinc/cp-kafka:7.6.1 kafka-storage random-uuid
      # and set it in .env as KAFKA_CLUSTER_ID
      CLUSTER_ID: "${KAFKA_CLUSTER_ID}"

    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ioda-net

  # -------------------------------------------------------------------------
  # Kafka UI
  # -------------------------------------------------------------------------
  # Provectus Kafka UI is a lightweight, zero-configuration web dashboard.
  # Accessible at http://localhost:8080 once the stack is running.
  # Lets you:
  #   - Browse topics and see message counts
  #   - Inspect individual messages (raw JSON)
  #   - Monitor consumer group lag
  #   - Manually produce test messages
  # -------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: ioda-kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ioda-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - ioda-net

  # -------------------------------------------------------------------------
  # MinIO (S3-compatible object storage)
  # -------------------------------------------------------------------------
  # MinIO is the Bronze data lake. It exposes an API identical to Amazon S3,
  # meaning the same boto3 / s3fs / Spark S3A code that works in production
  # against real S3 works here without modification.
  #
  # Ports:
  #   9000  - S3 API endpoint (used by ingester, Spark, boto3)
  #   9001  - MinIO web console (http://localhost:9001)
  #
  # Credentials are read from .env so they never appear in this file.
  # -------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: ioda-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - ioda-net

  # -------------------------------------------------------------------------
  # MinIO init (one-shot bucket creation)
  # -------------------------------------------------------------------------
  # This container runs once at startup, waits for MinIO to be healthy,
  # then creates the 'ioda-bronze' bucket if it doesn't already exist.
  # Using 'restart: on-failure' means it retries if MinIO isn't ready yet,
  # but won't run again once it exits 0.
  #
  # We also set the bucket lifecycle policy here: objects in the raw/ prefix
  # expire after 90 days to prevent unbounded disk growth.
  # -------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    container_name: ioda-minio-init
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/ioda-bronze &&
        mc mb --ignore-existing local/ioda-silver &&
        echo 'Buckets ready.' &&
        mc ls local/
      "
    networks:
      - ioda-net

  # -------------------------------------------------------------------------
  # Ingester
  # -------------------------------------------------------------------------
  # The Python container that runs ioda_bronze_ingestion.py on a schedule.
  # It pulls data from the IODA API and writes to both:
  #   - Kafka (raw.ioda.* topics) for stream processing
  #   - MinIO (ioda-bronze bucket) as the immutable Bronze layer
  #
  # The container does NOT start automatically in backfill mode — it runs
  # the incremental cron loop by default. For backfills, use:
  #   docker compose run --rm ingester python ioda_bronze_ingestion.py --mode backfill ...
  # -------------------------------------------------------------------------
  ingester:
    build:
      context: ./ingester
      dockerfile: Dockerfile
    container_name: ioda-ingester
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      # IODA API
      IODA_BASE_URL: "https://api.ioda.inetintel.cc.gatech.edu/v2"
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      # MinIO / S3
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      S3_BUCKET_BRONZE: "ioda-bronze"
      # Ingestion config
      ENTITY_TYPE: "${ENTITY_TYPE:-country}"
      ENTITY_CODES: "${ENTITY_CODES:-IT}"
      LOOKBACK_MINUTES: "${LOOKBACK_MINUTES:-20}"
      POLL_INTERVAL_SECONDS: "${POLL_INTERVAL_SECONDS:-900}"
    networks:
      - ioda-net
    volumes:
      # Mount the script directory so you can edit code without rebuilding
      - ./ingester:/app

# -------------------------------------------------------------------------
# Named volumes — data persists across container restarts
# -------------------------------------------------------------------------
volumes:
  kafka-data:
    driver: local
  minio-data:
    driver: local

# -------------------------------------------------------------------------
# Network — all containers share one bridge network
# -------------------------------------------------------------------------
networks:
  ioda-net:
    driver: bridge