---
# Internet Outage Intelligence Stack
# ====================================
# Directory layout (from project root):
#   ./ingestion/ioda/   - IODA ingester source + Dockerfile
#   ./ingestion/ripe/   - RIPE Atlas ingester source + Dockerfile
#   ./spark-jobs/       - PySpark silver layer scripts + entrypoint.sh
#
# Data flow:
#   IODA API   -> ingester        -> Kafka (raw.ioda.*) + MinIO (bronze/ioda/...)
#   RIPE WS    -> ripe-ingester   -> Kafka (raw.ripe.ping) + MinIO (bronze/ripe/...)
#   MinIO bronze + Kafka -> Spark -> MinIO (silver/...)
#
# Services (always-on):
#   kafka, kafka-ui, minio, minio-init, ingester, ripe-ingester, spark-silver-stream
#
# On-demand batch Silver jobs:
#   docker compose run --rm --no-deps spark-silver-ioda [--start YYYY-MM-DD] [--end YYYY-MM-DD]
#   docker compose run --rm --no-deps spark-silver-ripe  [--start YYYY-MM-DD] [--end YYYY-MM-DD]

services:

  # -------------------------------------------------------------------------
  # Kafka (KRaft mode â€” no Zookeeper)
  # -------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_RETENTION_BYTES: -1
      KAFKA_LOG_SEGMENT_BYTES: 134217728
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      CLUSTER_ID: "${KAFKA_CLUSTER_ID}"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - outage-net

  # -------------------------------------------------------------------------
  # Kafka UI â€” http://localhost:8080
  # -------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ioda-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - outage-net

  # -------------------------------------------------------------------------
  # MinIO â€” S3-compatible object storage (bronze + silver + gold)
  # Ports: 9000 (S3 API), 9001 (web console â€” http://localhost:9001)
  # -------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9090:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - outage-net

  # -------------------------------------------------------------------------
  # MinIO init â€” bucket housekeeping (runs on every stack start)
  # -------------------------------------------------------------------------
  # Creates bronze, silver, gold buckets.
  # Removes stale ioda-bronze and ioda-silver buckets from the original compose.
  # -------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    container_name: minio-init
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        echo '--- Ensuring canonical buckets exist ---' &&
        mc mb --ignore-existing local/bronze &&
        mc mb --ignore-existing local/silver &&
        echo '--- Removing stale legacy buckets ---' &&
        mc rb --force local/ioda-bronze 2>/dev/null && echo 'Removed ioda-bronze' || echo 'ioda-bronze: not present or not empty, skipping' &&
        mc rb --force local/ioda-silver 2>/dev/null && echo 'Removed ioda-silver' || echo 'ioda-silver: not present or not empty, skipping' &&
        echo '--- Current bucket list ---' &&
        mc ls local/
      "
    networks:
      - outage-net

  # -------------------------------------------------------------------------
  # IODA Bronze Ingester
  # -------------------------------------------------------------------------
  # Polls IODA REST API every POLL_INTERVAL_SECONDS. Writes to:
  #   - Kafka  (raw.ioda.alerts / raw.ioda.events / raw.ioda.signals)
  #   - MinIO  s3a://bronze/ioda/...
  # -------------------------------------------------------------------------
  ingester:
    build:
      context: ./ingestion/ioda
      dockerfile: Dockerfile
    container_name: ioda-ingester
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      IODA_BASE_URL: "https://api.ioda.inetintel.cc.gatech.edu/v2"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      S3_BUCKET_BRONZE: "bronze"
      S3_BUCKET_SILVER: "silver"
      ENTITY_TYPE: "${ENTITY_TYPE:-country}"
      ENTITY_CODES: "${TARGET_COUNTRIES:-IT MM IN PK UA RU PS SY IR TR BD NG US DE GB}"
      LOOKBACK_MINUTES: "${LOOKBACK_MINUTES:-20}"
      POLL_INTERVAL_SECONDS: "${POLL_INTERVAL_SECONDS:-900}"
    volumes:
      - ./ingestion/ioda:/app
    networks:
      - outage-net

  # -------------------------------------------------------------------------
  # RIPE Atlas Bronze Ingester (WebSocket streaming)
  # -------------------------------------------------------------------------
  # Maintains a persistent WebSocket to RIPE Atlas. Writes to:
  #   - Kafka  (raw.ripe.ping)
  #   - MinIO  s3a://bronze/ripe/ping/...
  # -------------------------------------------------------------------------
  ripe-ingester:
    build:
      context: ./ingestion/ripe
      dockerfile: Dockerfile
    container_name: ripe-ingester
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      S3_ENDPOINT_URL: "http://minio:9000"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
      S3_BUCKET_BRONZE: "bronze"
    volumes:
      - ./ingestion/ripe:/app
    networks:
      - outage-net

  # =========================================================================
  # SILVER LAYER â€” Batch jobs (on-demand, exit when done)
  # =========================================================================
  # Read:  s3a://bronze/...  (MinIO)
  # Write: s3a://silver/...  (MinIO)
  #
  # entrypoint.sh in ./spark-jobs/ pre-creates Ivy cache dirs as the spark
  # user before calling spark-submit, fixing the root-owned volume write error.
  #
  # Invoke:
  #   docker compose run --rm --no-deps spark-silver-ioda
  #   docker compose run --rm --no-deps spark-silver-ioda --start 2026-05-28 --end 2026-06-04
  #   docker compose run --rm --no-deps spark-silver-ripe  --start 2026-05-28 --end 2026-06-04
  # =========================================================================

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      sh -c "
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.ioda.alerts  --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.ioda.events  --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.ioda.signals --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.ripe.ping    --partitions 1 --replication-factor 1 &&
        echo 'Kafka topics created.'
      "
    networks:
      - outage-net

  spark-silver-ioda:
    image: apache/spark:3.5.1
    container_name: spark-silver-ioda
    profiles: ["batch"]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      S3_ENDPOINT_URL:  "http://minio:9000"
      S3_ACCESS_KEY:    "${MINIO_ROOT_USER}"
      S3_SECRET_KEY:    "${MINIO_ROOT_PASSWORD}"
      S3_BUCKET_BRONZE: "bronze"
      S3_BUCKET_SILVER: "silver"
    volumes:
      - ./spark-jobs:/opt/spark-jobs
    # python submit.py is the entrypoint; 'ioda' selects the job.
    # Extra args from 'docker compose run spark-silver-ioda --start X --end Y'
    # replace command: and are forwarded to silver_ioda.py by submit.py.
    entrypoint: ["python3", "/opt/spark-jobs/submit.py", "ioda"]
    command: []
    networks:
      - outage-net

  spark-silver-ripe:
    image: apache/spark:3.5.1
    container_name: spark-silver-ripe
    profiles: ["batch"]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      S3_ENDPOINT_URL:  "http://minio:9000"
      S3_ACCESS_KEY:    "${MINIO_ROOT_USER}"
      S3_SECRET_KEY:    "${MINIO_ROOT_PASSWORD}"
      S3_BUCKET_BRONZE: "bronze"
      S3_BUCKET_SILVER: "silver"
    volumes:
      - ./spark-jobs:/opt/spark-jobs
    entrypoint: ["python3", "/opt/spark-jobs/submit.py", "ripe"]
    command: []
    networks:
      - outage-net

  # =========================================================================
  # SILVER LAYER â€” Structured Streaming (always-on, live Kafka path)
  # =========================================================================
  # Consumes Kafka topics from the Bronze ingesters.
  # Checkpoints in silver/_checkpoints/ persist offsets across restarts.
  # =========================================================================
  spark-silver-stream:
    image: apache/spark:3.5.1
    container_name: spark-silver-stream
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      S3_ENDPOINT_URL:         "http://minio:9000"
      S3_ACCESS_KEY:           "${MINIO_ROOT_USER}"
      S3_SECRET_KEY:           "${MINIO_ROOT_PASSWORD}"
      S3_BUCKET_BRONZE:        "bronze"
      S3_BUCKET_SILVER:        "silver"
      MICRO_BATCH_INTERVAL:    "${MICRO_BATCH_INTERVAL:-2 minutes}"
      TIMESCALEDB_USER:        "${TIMESCALEDB_USER}"
      TIMESCALEDB_PASSWORD:    "${TIMESCALEDB_PASSWORD}"
    volumes:
      - ./spark-jobs:/opt/spark-jobs
    entrypoint: ["python3", "/opt/spark-jobs/submit.py", "stream"]
    networks:
      - outage-net

  # =========================================================================
  # GOLD LAYER: TimescaleDB (Time-series optimized PostgreSQL)
  # =========================================================================
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${TIMESCALEDB_USER}
      POSTGRES_PASSWORD: ${TIMESCALEDB_PASSWORD}
      POSTGRES_DB: outage_intelligence
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - outage-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALEDB_USER} -d outage_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5


  spark-gold:
      image: apache/spark:3.5.1
      container_name: spark-gold
      profiles: ["batch"]
      depends_on:
        minio-init:
          condition: service_completed_successfully
        timescaledb:
          condition: service_healthy
      environment:
        S3_ENDPOINT_URL:      "http://minio:9000"
        S3_ACCESS_KEY:        "${MINIO_ROOT_USER}"
        S3_SECRET_KEY:        "${MINIO_ROOT_PASSWORD}"
        S3_BUCKET_SILVER:     "silver"
        TIMESCALEDB_USER:     "${TIMESCALEDB_USER}"
        TIMESCALEDB_PASSWORD: "${TIMESCALEDB_PASSWORD}"
      volumes:
        - ./spark-jobs:/opt/spark-jobs
      entrypoint: ["python3", "/opt/spark-jobs/submit.py", "gold"]
      command: []
      networks:
        - outage-net
  
    # =========================================================================
    # GOLD LAYER â€” Streaming job (always-on, near-real-time path)
    # =========================================================================
    # Watches Silver Parquet files in MinIO for new micro-batches written by
    # spark-silver-stream, and promotes them to TimescaleDB every 5 minutes.
    #
    # Replaces the need to run spark-gold on a cron after the initial backfill.
    # Once running, TimescaleDB is updated automatically as Silver grows.
    #
    # Checkpoints: silver/_checkpoints/gold-ripe/ and gold-ioda/
    # =========================================================================
  spark-gold-stream:
      image: apache/spark:3.5.1
      container_name: spark-gold-stream
      restart: unless-stopped
      depends_on:
        minio-init:
          condition: service_completed_successfully
        timescaledb:
          condition: service_healthy
        spark-silver-stream:
          condition: service_started      # Silver must be running first
      environment:
        S3_ENDPOINT_URL:       "http://minio:9000"
        S3_ACCESS_KEY:         "${MINIO_ROOT_USER}"
        S3_SECRET_KEY:         "${MINIO_ROOT_PASSWORD}"
        S3_BUCKET_SILVER:      "silver"
        TIMESCALEDB_USER:      "${TIMESCALEDB_USER}"
        TIMESCALEDB_PASSWORD:  "${TIMESCALEDB_PASSWORD}"
        GOLD_STREAM_INTERVAL:  "${GOLD_STREAM_INTERVAL:-5 minutes}"
      volumes:
        - ./spark-jobs:/opt/spark-jobs
      entrypoint: ["python3", "/opt/spark-jobs/submit.py", "gold-stream"]
      networks:
        - outage-net

    # jupyter:
    #   image: jupyter/scipy-notebook:latest
    #   container_name: ioda-jupyter
    #   restart: unless-stopped
    #   ports:
    #     - "8888:8888"
    #   environment:
    #     JUPYTER_ENABLE_LAB: "yes"
    #   volumes:
    #     - ./notebooks:/home/jovyan/work
    #   networks:
    #     - outage-net
    
  dashboard:
      build:
        context: ./dashboard
        dockerfile: Dockerfile
      container_name: dashboard
      restart: unless-stopped
      ports:
        - "8501:8501"
      environment:
        TIMESCALEDB_HOST:     "timescaledb"
        TIMESCALEDB_USER:     "${TIMESCALEDB_USER}"
        TIMESCALEDB_PASSWORD: "${TIMESCALEDB_PASSWORD}"
        TIMESCALEDB_DB:       "outage_intelligence"
      depends_on:
        timescaledb:
          condition: service_healthy
      networks:
        - outage-net

# -------------------------------------------------------------------------
# Named volumes
# -------------------------------------------------------------------------
volumes:
  kafka-data:
    driver: local
  minio-data:
    driver: local
  timescaledb-data:
    driver: local

# -------------------------------------------------------------------------
# Network
# -------------------------------------------------------------------------
networks:
  outage-net:
    driver: bridge